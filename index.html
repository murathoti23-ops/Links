<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surprise</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

/* surprise screen */

#surpriseScreen{
    text-align:center;
}

#surpriseBtn{
    font-size:40px;
    padding:20px 50px;
    border:none;
    border-radius:40px;
    background:#ff2e63;
    color:white;
    cursor:pointer;
}

/* main content */

.container{
    display:none;
}

h1{
    font-size:3rem;
    margin-bottom:30px;
}

button{
    padding:15px 35px;
    font-size:1.2rem;
    border:none;
    border-radius:30px;
    cursor:pointer;
    margin:10px;
}

#yes{
    background:#ff2e63;
    color:white;
}

#no{
    background:white;
    color:#ff2e63;
    position:absolute;
}

#message{
    font-size:1.8rem;
    margin-top:20px;
    display:none;
}

#playVoice{
    display:none;
}

/* hearts */

.heart{
    position:absolute;
    font-size:24px;
    animation:float 8s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}
50%{opacity:1;}
100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}
}

</style>
</head>

<body>

<!-- Surprise Screen -->

<div id="surpriseScreen">
<button id="surpriseBtn">🎁 Surprise</button>
</div>


<!-- Main Content -->

<div class="container" id="mainContent">

<h1>Marati Likitha Savanth ki boy friend unnara? 💖</h1>

<button id="yes">YES ❤️</button>
<button id="no">NO 💔</button>

<div id="message">
I knew you would say YES! 💔<br><br>
Play Boy asale akkada!!!! Minimum oka 7 boy friends maintanence lo unnaru 🙂‍↔️
</div>

<br>

<button id="playVoice">🔊 Click Here</button>

<audio id="voice">
<source src="audio.mp3" type="audio/mp3">
</audio>

</div>

<script>

const surpriseBtn = document.getElementById("surpriseBtn");
const surpriseScreen = document.getElementById("surpriseScreen");
const mainContent = document.getElementById("mainContent");

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const msg = document.getElementById("message");

const playVoice=document.getElementById("playVoice");
const voice=document.getElementById("voice");


/* surprise click */

surpriseBtn.addEventListener("click",()=>{
    surpriseScreen.style.display="none";
    mainContent.style.display="block";
});


/* NO button runs away */

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});


/* YES click */

yesBtn.addEventListener("click", () => {
    msg.style.display = "block";
    yesBtn.style.display="none";
    noBtn.style.display="none";
    playVoice.style.display="inline-block";
});


/* play voice */

playVoice.addEventListener("click",()=>{
voice.play();
});


/* floating hearts */

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 5) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 8000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
