<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vadina </title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
}

.container{
    z-index:2;
}

h1{
    font-size:3rem;
}

button{
    padding:15px 35px;
    font-size:1.2rem;
    border:none;
    border-radius:30px;
    cursor:pointer;
    margin:10px;
}

#yes{
    background:#ff2e63;
    color:white;
}

#no{
    background:white;
    color:#ff2e63;
    position:absolute;
}

#message{
    display:none;
    font-size:1.6rem;
    margin-top:20px;
}

#playVoice{
    display:none;
    background:white;
    color:#ff2e63;
}

/* floating hearts */

.heart{
    position:absolute;
    font-size:24px;
    animation:float 8s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
    }
    50%{opacity:1;}
    100%{
        transform:translateY(-10vh) scale(1.2);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday Vadina 🎂</h1>

<p>Will you accept this special birthday wish? </p>

<button id="yes">YES </button>
<button id="no">NO </button>

<div id="message">
    Many more happy returns of the day Vadina 💐 <br><br>
    You are very special to our family 😊<br>
    May your life be filled with happiness, love and success! 🎉
</div>

<br>

<button id="playVoice">🔊 Vadina idi click cheyandi 😊</button>

<audio id="voice">
    <source src="audio.mp3" type="audio/mp3">
</audio>

</div>

<script>

const yesBtn=document.getElementById("yes");
const noBtn=document.getElementById("no");
const msg=document.getElementById("message");
const playVoice=document.getElementById("playVoice");
const voice=document.getElementById("voice");

/* NO button runs away */

noBtn.addEventListener("mouseover",()=>{
    const x=Math.random()*(window.innerWidth-100);
    const y=Math.random()*(window.innerHeight-50);

    noBtn.style.left=x+"px";
    noBtn.style.top=y+"px";
});

/* YES clicked */

yesBtn.addEventListener("click",()=>{
    msg.style.display="block";
    playVoice.style.display="inline-block";
    yesBtn.style.display="none";
    noBtn.style.display="none";
});

/* play voice */

playVoice.addEventListener("click",()=>{
    voice.play();
});

/* floating hearts */

function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
